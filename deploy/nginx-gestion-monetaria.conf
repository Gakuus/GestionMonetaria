# ============================================================
# GestionMonetaria — nginx reverse proxy config (SSL-ready)
# This file is a template. bootstrap.sh replaces {{DOMAIN}}
# and {{PORT}} with values from config.yml
# ============================================================

server {
    listen 80;
    server_name {{DOMAIN}};

    # Certbot will auto-fill the SSL section after:
    #   certbot --nginx -d {{DOMAIN}}

    location / {
        proxy_pass http://127.0.0.1:{{PORT}};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # GestionMonetaria health check
    location /api/health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
